<section class="my-3">
  <!-- Top Section -->
  <div class="col-md-12 col-lg-3"></div>

  <!-- Bottom Section -->
  <div class="col-md-12 col-lg-9">
    <div>
      <img [src]="product()?.image" [alt]="product()?.name" />
    </div>
    <div class="d-flex flex-column my-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="display-6 fw-semibold text-success mb-0">{{ product()?.name }}</h1>
        <span class="fs-4 fw-bold text-dark">$ {{ product()?.price }}</span>
      </div>

      <div class="mb-3">
        <h2 class="h5 text-decoration-underline text-secondary">{{ product()?.category }}</h2>

        <h3 class="h6 fw-semibold text-muted">{{ product()?.category }}</h3>

        <p class="mt-2 text-dark">{{ product()?.description }}</p>
      </div>
    </div>

    <div class="d-flex gap-3">
      <button
        class="btn btn-success px-4 text-uppercase fw-bold d-flex align-items-center gap-2 transition-all"
        (click)="addToCart()"
      >
        add to card
      </button>
    </div>
  </div>
</section>
