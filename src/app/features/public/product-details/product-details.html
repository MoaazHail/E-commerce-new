<section class="my-3">
  <!-- Top Section -->
  <div class="col-md-12 col-lg-3">
    <!-- nav -->
    <nav
      class="d-flex justify-content-center align-items-center gap-4 bg-dark text-secondary mb-3 rounded-pill py-2"
    >
      <a routerLink="/" class="cursor-pointer nav-link">Home ></a>
      <span class="text-light cursor-pointer">products/{{ productId() }} ></span>
    </nav>
    <div
      id="productGallery"
      class="carousel slide shadow-sm rounded overflow-hidden"
      data-bs-ride="carousel"
    >
      <div class="carousel-inner">
        @for (img of product()?.images; track img; let isFirst = $first) {
          <div class="carousel-item" [class.active]="isFirst">
            <img
              [src]="img"
              class="d-block w-100"
              [alt]="product()?.title"
              style="object-fit: cover; height: 400px"
            />
          </div>
        }
      </div>
    </div>

    <div class="d-flex gap-2 mt-2 overflow-auto">
      @for (img of product()?.images; track img) {
        <img
          [src]="img"
          class="img-thumbnail cursor-pointer"
          style="width: 60px; height: 60px; object-fit: cover"
        />
      }
    </div>
  </div>
  <!-- Bottom Section -->
  <div class="col-md-12 col-lg-9">
    <div class="d-flex flex-column my-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="display-6 fw-semibold text-success mb-0">{{ product()?.title }}</h1>
        <span class="fs-4 fw-bold text-dark">$ {{ product()?.price }}</span>
      </div>

      <div class="mb-3">
        <h2 class="h5 text-decoration-underline text-secondary">{{ product()?.category }}</h2>

        <h3 class="h6 fw-semibold text-muted">{{ product()?.brand }}</h3>

        <p class="mt-2 text-dark">{{ product()?.description }}</p>
      </div>
    </div>

    <div class="d-flex gap-3">
      <button
        class="btn btn-success px-4 text-uppercase fw-bold d-flex align-items-center gap-2 transition-all"
        (click)="addToCart()"
      >
        add to card
      </button>
    </div>
  </div>
</section>
