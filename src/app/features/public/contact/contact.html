<div class="container my-5 pt-4">
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm p-4 h-100">
        <div class="contact-section mb-4">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div
              class="icon-box bg-danger rounded-circle d-flex align-items-center justify-content-center"
            >
              <lucide-angular name="phone" size="20" color="white"></lucide-angular>
            </div>
            <h5 class="m-0 fw-bold">Call To Us</h5>
          </div>
          <p class="small mb-2">We are available 24/7, 7 days a week.</p>
          <p class="small fw-medium">Phone: +8801611112222</p>
        </div>

        <hr class="my-4 text-muted opacity-25" />

        <div class="contact-section">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div
              class="icon-box bg-danger rounded-circle d-flex align-items-center justify-content-center"
            >
              <!-- <lucide-angular name="mail" size="20" color="white"></lucide-angular> -->
            </div>
            <h5 class="m-0 fw-bold">Write To Us</h5>
          </div>
          <p class="small mb-3">Fill out our form and we will contact you within 24 hours.</p>
          <p class="small mb-2">Emails: customer&#64;exclusive.com</p>
          <p class="small fw-medium">Emails: support&#64;exclusive.com</p>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card border-0 shadow-sm p-4">
        <form>
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <input
                type="text"
                class="form-control bg-light border-0 py-3 px-3"
                placeholder="Your Name *"
                required
              />
            </div>
            <div class="col-md-4">
              <input
                type="email"
                class="form-control bg-light border-0 py-3 px-3"
                placeholder="Your Email *"
                required
              />
            </div>
            <div class="col-md-4">
              <input
                type="tel"
                class="form-control bg-light border-0 py-3 px-3"
                placeholder="Your Phone *"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <textarea
              class="form-control bg-light border-0 py-3 px-3"
              rows="8"
              placeholder="Your Message"
            ></textarea>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-danger px-5 py-3 rounded-1 fw-medium border-0">
              Send Message
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
