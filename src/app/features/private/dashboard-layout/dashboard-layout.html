<div class="d-flex flex-column flex-lg-row">
  <aside
    id="sidebarMenu"
    class="d-none d-lg-flex bg-secondary text-white p-3 flex-column shadow"
    style="width: 250px; z-index: 1040; min-height: 100vh"
  >
    <div class="overflow-y-auto">
      <h3 class="mb-4 text-center border-bottom pb-3 d-none d-lg-block">Admin Panel</h3>

      <a class="btn btn-outline-light w-100 mb-4" routerLink="/">Home Page</a>

      <ul class="nav flex-column gap-2">
        <li class="nav-item">
          <a
            routerLink="/dashboard"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link text-white d-flex align-items-center rounded-2 p-2"
          >
            <lucide-icon name="layout-dashboard" size="18" class="me-2"></lucide-icon>
            <span>Overview</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="orders"
            routerLinkActive="active-link"
            class="nav-link text-white d-flex align-items-center rounded-2 p-2"
          >
            <lucide-icon name="shopping-cart" size="18" class="me-2"></lucide-icon>
            <span>Orders</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="products"
            routerLinkActive="active-link"
            class="nav-link text-white d-flex align-items-center rounded-2 p-2"
          >
            <lucide-icon name="package" size="18" class="me-2"></lucide-icon>
            <span>Products</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <main class="w-100 bg-light min-vh-100">
    <router-outlet></router-outlet>
  </main>
</div>
