<div class="d-flex">
  <aside
    class="bg-secondary text-white p-3 d-flex flex-column position-fixed top-0 start-0 vh-100 shadow"
    style="width: 250px; z-index: 1040"
  >
    <div>
      <h3 class="mb-4 text-center border-bottom pb-3">Admin Panel</h3>

      <a class="btn btn-outline-light w-100 mb-4" routerLink="/">Home Page</a>

      <ul class="nav flex-column gap-2">
        <!-- Overview -->
        <li class="nav-item">
          <a
            routerLink="/dashboard"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link text-white d-flex align-items-center rounded-2 p-2"
          >
            <lucide-icon name="layout-dashboard" size="18" class="me-2"></lucide-icon>
            <span>Overview</span>
          </a>
        </li>

        <!-- Orders -->
        <li class="nav-item">
          <a
            routerLink="orders"
            routerLinkActive="active-link"
            class="nav-link text-white d-flex align-items-center p-2"
          >
            <lucide-icon name="shopping-cart" size="18" class="me-2"></lucide-icon>
            <span>Orders</span>
          </a>
        </li>

        <!-- Products -->
        <li class="nav-item">
          <a routerLink="products" routerLinkActive="active-link" class="nav-link text-white">
            <lucide-icon name="package" size="18" class="me-2"></lucide-icon>

            <span>Products</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <main style="margin-left: 250px; min-height: 100vh; width: 100%" class="bg-light">
    <router-outlet></router-outlet>
  </main>
</div>
